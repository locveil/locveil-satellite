# Convention: process/contracts.md §4 — job name `contract-guard`, --check only.
# Layer 1 (coherence): vendored contract_guard.py @ contract-guard-v1.
# Layer 2 (owned-surface guard): check_esp32_site.py — the esp32-site marker check.
name: contract-guard

on:
  push:
    branches: [main]
    paths: ["contracts/**", "scripts/contract_guard.py", "scripts/check_esp32_site.py",
            "provisioning/ansible/templates/esp32-site.conf.j2",
            ".github/workflows/contract-guard.yml"]
  pull_request:
    paths: ["contracts/**", "scripts/contract_guard.py", "scripts/check_esp32_site.py",
            "provisioning/ansible/templates/esp32-site.conf.j2",
            ".github/workflows/contract-guard.yml"]

jobs:
  contract-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/contract_guard.py --check
      - run: python3 scripts/check_esp32_site.py
