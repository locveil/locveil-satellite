# Convention: process/contracts.md §4 — job name `contract-guard`, --check only.
# Layer 1 (coherence): vendored contract_guard.py @ contract-guard-v3 (OPS-12; CI runs
# strict — no --relax-tags — the pushed tag must exist, unlike the mid-bump local hook).
# Layer 2 (owned-surface guards): check_esp32_site.py (esp32-site markers) +
# check_docs_manifest.py (docs-manifest coherence, process/user-docs.md §4).
name: contract-guard

on:
  push:
    branches: [main]
    paths: ["contracts/**", ".contract-guard.toml", ".repin.toml", "scripts/contract_guard.py", "scripts/repin.py", "scripts/check_esp32_site.py",
            "scripts/check_docs_manifest.py", "docs/manifest.json", "docs/guides/**",
            "README.md", "CONTRIBUTING.md", "provisioning/README.md",
            "provisioning/ansible/templates/esp32-site.conf.j2",
            ".github/workflows/contract-guard.yml"]
  pull_request:
    paths: ["contracts/**", ".contract-guard.toml", ".repin.toml", "scripts/contract_guard.py", "scripts/repin.py", "scripts/check_esp32_site.py",
            "scripts/check_docs_manifest.py", "docs/manifest.json", "docs/guides/**",
            "README.md", "CONTRIBUTING.md", "provisioning/README.md",
            "provisioning/ansible/templates/esp32-site.conf.j2",
            ".github/workflows/contract-guard.yml"]

jobs:
  contract-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PROD-25: TAG-MISSING resolves owned STAMP tags via `git tag -l`. The convention's
      # `fetch-tags: true` one-liner is a no-op here (actions/checkout#1467: on the default
      # shallow single-commit fetch it only drops --no-tags, and tag auto-following can't
      # see tags on unfetched commits — run 29414821199 was the live proof). Fetch the tag
      # refs explicitly; shallow stays fine, the rule only needs the refs.
      - run: git fetch --tags --depth=1 origin
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/contract_guard.py --check
      # HK-12 §5 staleness stage — ADVISORY (config default_fail_on = "none"): the
      # recorded satellite carve-out holds until FW first light; the first release gate
      # raises it (release flows then run --fail-on any).
      - run: python3 scripts/repin.py --check
      - run: python3 scripts/check_esp32_site.py
      - run: python3 scripts/check_docs_manifest.py
