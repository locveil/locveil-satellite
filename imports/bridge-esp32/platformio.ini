; platformio.ini — single image, all four bridge boxes (Revox A77 / B215,
; Pioneer CLD-D925, Panasonic NV-FS90). Framework = ESP-IDF (no Arduino).
;
; First flash over USB-serial (the only wired step, ever); later updates over
; MQTT-triggered esp_https_ota (see REQUIREMENTS.md FR-17 + Phase 3 firmware).

[platformio]
default_envs = serial

[env]
platform              = espressif32
board                 = esp32dev          ; generic WROOM-32 (4 MB flash)
framework             = espidf
monitor_speed         = 115200
board_build.partitions = partitions.csv   ; custom dual-OTA, 1.5 MB app slots
board_build.flash_size = 4MB
; PIO bundles its own framework-espidf under ~/.platformio/packages/.
; A separate /home/droman42/esp/v5.5/esp-idf install is available for direct
; idf.py use on other projects. To swap PIO to that copy:
;   platform_packages = framework-espidf @ file:///home/droman42/esp/v5.5/esp-idf
; Site IDF defaults live in sdkconfig.defaults (committed); per-env sdkconfig
; is gitignored (regenerated per build from the defaults file).

; ---- First flash, USB-serial — once per box ----
[env:serial]
upload_protocol = esptool
; After first flash, set the box's identity over MQTT (retained), no cable:
;   mosquitto_pub -h <broker> -t /provision -r -m revox_b215
; Box stores it in NVS and reboots into that driver.

; ---- OTA: NOT ArduinoOTA (incompatible with IDF). The firmware listens for
; ---- an .bin URL on /devices/<id>/ota and pulls via esp_https_ota. The PIO
; ---- `ota` env is intentionally OMITTED — OTA is triggered from the broker
; ---- side, not from a PIO upload command. See REQUIREMENTS.md FR-17.
